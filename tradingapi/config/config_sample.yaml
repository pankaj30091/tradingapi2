# bhavcopy path  - this is the path where symbol files from brokers are saved
bhavcopy_folder : /home/psharma/onedrive/rfiles/data/bhavcopy

# Optional: proxy for broker HTTP requests (e.g. connect, save_symbol_data).
# When a broker has USE_PROXY: true, proxies are fetched from the source (e.g. webshare).
proxy:
  source: webshare
  api_key: # Webshare API key (or set WEBSHARE_PROXY_API_KEY env)
  username: # Optional: override per-proxy username from API
  password: # Optional: override per-proxy password from API
  country_code: # Optional: e.g. IN
  mode: direct

commissions:
  - effective_date: "2020-01-01"
    file: "commissions_20200101.yaml"
  - effective_date: "2024-10-01"
    file: "commissions_20241001.yaml"
  - effective_date: "2024-12-02"
    file: "commissions_20241216.yaml"

FIVEPAISA:
  USE_PROXY: false
  APP_NAME:
  APP_SOURCE:
  USER_ID:
  PASSWORD:
  USER_KEY:
  ENCRYPTION_KEY:
  TOTP_TOKEN:
  PIN:
  CLIENT_ID:
  SYMBOLCODES:
  USERTOKEN:

SHOONYA:
  USE_PROXY: false
  USER:
  PWD:
  VC:
  APPKEY:
  TOKEN:
  SYMBOLCODES: "/home/psharma/onedrive/rfiles/data/static/shoonya_symbols"
  USERTOKEN:

ICICIDIRECT:
  USE_PROXY: false
  API_KEY:
  API_SECRET:
  USER_ID: # Optional: used by icicidirect-generate-session (AUTO_SESSION_TOKEN_CMD)
  PASSWORD: # Optional: used by icicidirect-generate-session
  TOTP_TOKEN: # Optional: used by icicidirect-generate-session
  API_SESSION_TOKEN: # Optional: direct session token
  USERTOKEN: # Optional: path to cache token file
  USERTOKEN_MAX_AGE_HOURS: 20
  AUTO_SESSION_TOKEN_CMD: # Optional: shell command that outputs a fresh session token
  AUTO_LOGIN: true # Optional: auto-build token command when AUTO_SESSION_TOKEN_CMD is empty
  SELENIUM_HEADLESS: true
  SELENIUM_WEBDRIVER_PATH: # Optional: geckodriver path or folder containing geckodriver
  LOGIN_USERNAME_SELECTOR: # Optional selector override, ex: #txtuid
  LOGIN_PASSWORD_SELECTOR: # Optional selector override, ex: #txtPass
  LOGIN_TNC_SELECTOR: # Optional selector override, ex: #chkssTnc
  LOGIN_SUBMIT_SELECTOR: # Optional selector override, ex: #btnSubmit
  TOTP_INPUT_SELECTOR: # Optional selector override
  TOTP_SUBMIT_SELECTOR: # Optional selector override
  # Example:
  # AUTO_SESSION_TOKEN_CMD: >
  #   icicidirect-generate-session
  #   --api-key "${ICICI_API_KEY}"
  #   --user-id "${ICICI_USER_ID}"
  #   --password "${ICICI_PASSWORD}"
  #   --totp-token "${ICICI_TOTP_TOKEN}"
  SYMBOL_MASTER_URL: # Optional: symbol master zip url
  SYMBOLCODES:

DHAN:
  USE_PROXY: false
  CLIENT_ID:
  ACCESS_TOKEN: # Optional fallback if TOTP/PIN flow is not used
  TOTP_TOKEN: # Optional: used for auto token refresh
  PIN: # Optional: used for auto token refresh
  USERTOKEN: # Optional: token cache file path
  SYMBOLCODES:
  QUOTE_RATE_LIMIT_REDIS_DB: 4 # Optional: dedicated Redis DB for global quote limiter
  QUOTE_RATE_LIMIT_RPS: 1 # Optional: quote API limit in requests/second
  HISTORICAL_RATE_LIMIT_RPS: 10 # Optional: historical API limit in requests/second
  REQUEST_STREAMING_DATA_RATE_LIMIT_RPS: 10 # Optional: streaming subscription request rate in requests/second
